name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  backend:
    name: Backend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint -- --max-warnings=0

      - name: Type check (TS)
        working-directory: backend
        run: npx tsc --noEmit

      - name: Build backend
        working-directory: backend
        run: npm run build


  mobile:
    name: Mobile Build & Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Expo Doctor
        working-directory: mobile
        run: npx expo-doctor

      - name: Type check (TS)
        working-directory: mobile
        run: npx tsc --noEmit

      - name: Lint mobile
        working-directory: mobile
        run: npm run lint -- --max-warnings=0

      - name: Validate Expo config
        working-directory: mobile
        run: npx expo config --type public

      - name: Expo prebuild check
        working-directory: mobile
        run: npx expo prebuild --no-install